services:
  # Servidor Web: Redirecciona el puerto 8080 para evitar conflictos con el puerto 80 local.
  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./html:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
  
  #interprete de PHP y extension para poder interactuar con mariaDB
  php:
    image: php:8.2-fpm
    volumes:
      - ./html:/var/www/html
    command: >
      bash -c "docker-php-ext-install mysqli && php-fpm"
    environment:
      DB_HOST: db
      DB_NAME: ${MariadbDatabase}
      DB_USER: ${MariadbUser}
      DB_PASS: ${MariadbPassword}
    depends_on:
      db:
        condition: service_healthy

  #creacion de la base de datos
  # ⚠ ADVERTENCIA: Cambiar las contraseñas aquí no afectará un volumen ya existente.
  # Ver instrucciones de actualización en: ./README.md -> ## Ciclo de Vida de la Base de Datos y Persistencia
  db:
    image: mariadb:latest
    container_name: MariadbContainer
    environment:
      MYSQL_ROOT_PASSWORD: ${MariadbRootPassword}
      MYSQL_DATABASE: ${MariadbDatabase}
      MYSQL_USER: ${MariadbUser}
      MYSQL_PASSWORD: ${MariadbPassword}
    volumes:
      - ./mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10